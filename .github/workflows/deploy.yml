# .github/workflows/deploy.yml
# CI/CD Pipeline: Test → Build → Push GHCR → Deploy to Kubernetes
# Runs on: push to main (deploy), PR to main (test + build only)

name: Test → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tokensentry-ai/api

jobs:
  # ── TEST ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tokensentry_test
          POSTGRES_USER: tokensentry
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://tokensentry:test@localhost:5432/tokensentry_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL_TEST }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ── BUILD ─────────────────────────────────────────────────
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── DEPLOY ────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name tokensentry-prod --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/tokensentry-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl rollout status deployment/tokensentry-api --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -l app=tokensentry-api
          kubectl exec -it $(kubectl get pod -l app=tokensentry-api -o jsonpath="{.items[0].metadata.name}") \
            -- curl -sf http://localhost:3000/health/ready

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_ALERTS }} \
            -H 'Content-type: application/json' \
            -d '{"text":"✅ Deploy succeeded: `${{ github.sha }}` by ${{ github.actor }}"}'

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_ALERTS }} \
            -H 'Content-type: application/json' \
            -d '{"text":"🚨 Deploy FAILED: `${{ github.sha }}` — check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
