user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    charset utf-8;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;

    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    client_max_body_size 10m;
    large_client_header_buffers 4 16k;

    client_header_timeout 10s;
    client_body_timeout 60s;
    send_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # JSON access logs for Loki ingestion via Promtail
    log_format json escape=json
      '{"t":"$time_iso8601","ip":"$remote_addr","m":"$request_method",'
      '"u":"$uri","s":$status,"b":$body_bytes_sent,'
      '"rt":"$request_time","ut":"$upstream_response_time",'
      '"cs":"$upstream_cache_status","org":"$http_x_ts_org_id",'
      '"cid":"$upstream_http_x_ts_call_id","ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json buffer=32k flush=5s;

    resolver 127.0.0.11 8.8.8.8 valid=30s;

    include /etc/nginx/snippets/compression.conf;
    include /etc/nginx/snippets/rate-limits.conf;
    include /etc/nginx/conf.d/*.conf;
}
