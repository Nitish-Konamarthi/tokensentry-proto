proxy_cache_path /var/cache/nginx/analytics
    levels=1:2 keys_zone=analytics:10m max_size=2g inactive=5m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name api.tokensentry.ai localhost;

    # In local dev, serve directly on port 80 without SSL
    # In production, redirect to HTTPS (Cloudflare handles this)

    include /etc/nginx/snippets/security.conf;

    access_log /var/log/nginx/api.log json buffer=32k flush=5s;
    error_log  /var/log/nginx/api.error.log warn;

    limit_conn conn_ip  100;
    limit_conn conn_org 1000;

    # CORS preflight
    if ($request_method = OPTIONS) { return 204; }

    # Health endpoints — no auth, no rate limit, no log
    location = /health/live  {
        access_log off;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }
    location = /health/ready {
        access_log off;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Prometheus metrics (internal network only)
    location = /metrics {
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        access_log off;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }

    # NGINX stub status for prometheus exporter
    location = /stub_status {
        stub_status;
        allow 172.20.0.0/16;
        allow 127.0.0.1;
        deny all;
        access_log off;
    }

    # ── AI Proxy (Core Product) ───────────────────────────
    # Streaming SSE, no buffering, no cache
    location /v1/proxy/ {
        limit_req zone=proxy burst=200 nodelay;
        limit_req_status 429;
        include /etc/nginx/snippets/streaming.conf;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
        proxy_next_upstream off;
        proxy_read_timeout 300s;
    }

    # ── Analytics (cacheable, 30s TTL) ───────────────────
    location /v1/analytics/ {
        limit_req zone=api burst=50 nodelay;
        proxy_cache analytics;
        proxy_cache_valid 200 30s;
        proxy_cache_valid any 1s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_key "$host$uri$http_x_ts_org_id";
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache $upstream_cache_status always;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }

    # ── Real-time spend (never cached) ───────────────────
    location = /v1/spend/realtime {
        limit_req zone=api burst=120 nodelay;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }

    # ── Budget Advisor (expensive AI — strict rate limit) ─
    location /v1/advisor/ {
        limit_req zone=advisor burst=5 nodelay;
        limit_req_status 429;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
        proxy_read_timeout 60s;
    }

    # ── Auth (brute force protection) ────────────────────
    location /v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }

    # ── Stripe webhooks (Stripe IP whitelist) ─────────────
    location = /v1/webhooks/stripe {
        # Stripe webhook IP ranges (from https://stripe.com/docs/ips)
        allow 3.18.12.63/32;
        allow 3.130.192.231/32;
        allow 13.235.14.237/32;
        allow 13.235.122.149/32;
        allow 18.211.135.69/32;
        allow 35.154.171.200/32;
        allow 52.15.183.38/32;
        allow 54.187.174.169/32;
        allow 54.187.205.235/32;
        allow 54.187.216.72/32;
        allow 54.241.31.99/32;
        allow 54.241.31.102/32;
        allow 54.241.34.107/32;
        allow 127.0.0.1;  # Local dev
        deny all;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
    }

    # ── All other /v1/ routes ─────────────────────────────
    location /v1/ {
        limit_req zone=api burst=150 nodelay;
        include /etc/nginx/snippets/proxy.conf;
        proxy_pass http://api_pool;
        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
    }

    # ── Security: block attack patterns ──────────────────
    location ~ /\. { deny all; return 404; }
    location ~* \.(php|asp|cgi|sh|py|pl|rb)$ { return 404; }
    location ~* (wp-admin|phpmyadmin|\.env|\.git|\.svn) { return 404; }

    # ── Custom error responses (JSON) ─────────────────────
    error_page 429 = @ratelimit;
    error_page 502 503 = @upstream_error;

    location @ratelimit {
        default_type application/json;
        return 429 '{"error":"RATE_LIMIT_EXCEEDED","message":"Slow down — check your plan limits at app.tokensentry.ai","retry_after":60}';
    }
    location @upstream_error {
        default_type application/json;
        return 502 '{"error":"UPSTREAM_ERROR","message":"TokenSentry API temporarily unavailable. Status: status.tokensentry.ai"}';
    }
}

# HTTPS redirect (production only — Cloudflare handles this)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tokensentry.ai;
    include /etc/nginx/snippets/ssl.conf;
    return 301 https://$server_name$request_uri;
}
