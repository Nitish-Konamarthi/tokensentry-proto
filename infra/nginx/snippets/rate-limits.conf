# Per-org rate limits using shared memory zones
# x-ts-org-id header set by our API middleware
limit_req_zone $http_x_ts_org_id   zone=proxy:10m    rate=100r/s;
limit_req_zone $http_x_ts_org_id   zone=api:10m      rate=300r/s;
limit_req_zone $binary_remote_addr  zone=auth:5m      rate=10r/m;
limit_req_zone $http_x_ts_org_id   zone=advisor:5m   rate=10r/m;
limit_req_zone $binary_remote_addr  zone=global:10m   rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_ip:10m;
limit_conn_zone $http_x_ts_org_id   zone=conn_org:10m;
