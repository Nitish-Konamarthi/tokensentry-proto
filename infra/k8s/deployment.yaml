apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokensentry-api
  namespace: tokensentry
  labels:
    app: tokensentry-api
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tokensentry-api
  template:
    metadata:
      labels:
        app: tokensentry-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Spread pods across nodes for HA
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: tokensentry-api
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: ghcr.io/tokensentry-ai/api:latest
          ports:
            - name: http
              containerPort: 3000
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: tokensentry-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tokensentry-api-hpa
  namespace: tokensentry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tokensentry-api
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: v1
kind: Service
metadata:
  name: tokensentry-api-service
  namespace: tokensentry
spec:
  selector:
    app: tokensentry-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: tokensentry
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tokensentry-api-pdb
  namespace: tokensentry
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: tokensentry-api
